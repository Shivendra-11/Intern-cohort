apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-eval-app
  namespace: devops-eval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-eval-app
  template:
    metadata:
      labels:
        app: devops-eval-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
