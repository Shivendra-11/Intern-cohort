; Advisory type-check config for the hand-written framework packages.
; mypy runs in CI as a non-blocking, informational step (see .github/workflows/ci.yml):
; ruff is the hard static-analysis gate; mypy surfaces type debt without failing the build.
[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_unused_ignores = False
warn_redundant_casts = True
no_implicit_optional = True
; Keep the surface to the maintained packages; generated/vendored trees are excluded.
exclude = (^|/)(\.venv|\.venv-framework|node_modules|target|dist|build|workspace|templates|fixtures|fixture-repo|target-repo|examples|ui)/

[mypy-tests.*]
ignore_errors = True
